<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <meta name="description" content="Guía interactiva de español para el canal Español Para Todos.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="text-slate-800">

    <!-- Header / Hero -->
    <header class="header-mesh text-white pt-12 pb-20 md:py-24 px-4 shadow-2xl relative overflow-hidden">
        <!-- Fondo de cuadrícula decorativo -->
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1" />
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#grid)" />
            </svg>
        </div>

        <div
            class="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between relative z-10 text-center md:text-left">
            <div class="md:w-3/5 mb-10 md:mb-0">
                <!-- Logo del canal -->
                <img src="Logo Español para todos_transp.png" alt="Logo Español Para Todos"
                    class="h-20 md:h-24 mx-auto md:mx-0 mb-6 bg-white rounded-full p-1.5 shadow-lg">

                <!-- Enlace al video -->
                <a id="video-link" href="#" target="_blank"
                    class="inline-block bg-white/20 hover:bg-white/30 backdrop-blur-md px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest mb-6 transition-all border border-white/20 group">
                    <span id="video-label">Cargando...</span>
                    <i class="fas fa-external-link-alt ml-2 opacity-50 group-hover:opacity-100"></i>
                </a>

                <h1 id="hero-title" class="text-4xl sm:text-5xl md:text-7xl font-black mb-8 leading-tight"></h1>

                <p
                    class="text-lg md:text-xl opacity-90 font-light max-w-2xl mx-auto md:mx-0 leading-relaxed flex flex-col md:flex-row items-center gap-3">
                    <span
                        class="bg-white/20 backdrop-blur-md text-white border border-white/30 px-4 py-1.5 rounded-xl font-bold text-sm tracking-wider">Objetivo</span>
                    <span id="objetivo"></span>
                </p>
            </div>

            <div class="md:w-2/5 flex justify-center hero-img-container">
                <img id="hero-img" src="" alt="Ilustración"
                    class="max-w-[280px] sm:max-w-xs md:max-w-full h-auto drop-shadow-2xl rounded-3xl">
            </div>
        </div>
    </header>

    <!-- Grid de fichas (generado por main.js) -->
    <main class="max-w-7xl mx-auto px-4 py-12 md:py-20">
        <div id="fichasGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 items-stretch">
            <!-- Las fichas se generan automáticamente desde contenido.json -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 pt-16 pb-10 mt-12">
        <div class="max-w-4xl mx-auto px-6 flex flex-col items-center text-center gap-6">
            <p class="text-slate-400 text-sm max-w-sm leading-relaxed">
                Material pedagógico para el nivel <strong class="text-white">A1</strong>.<br>
                Aprende español de forma natural y progresiva.
            </p>
            <a href="https://www.youtube.com/@Espanolparatodos-channel" target="_blank"
                class="inline-flex items-center gap-3 bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-2xl font-bold text-sm transition-all hover:scale-105 shadow-lg">
                <i class="fab fa-youtube text-xl"></i>
                Visita nuestro canal
            </a>
            <div class="w-full border-t border-white/10 pt-6">
                <p class="text-xs opacity-40">&copy; 2025 Español Para Todos &mdash; Guía de Nivel A1</p>
            </div>
        </div>
    </footer>

    <!-- Botón Scroll to Top -->
    <button id="scrollTopBtn" aria-label="Volver arriba">
        <i class="fas fa-arrow-up"></i>
    </button>

    <script src="main.js"></script>
</body>

</html>
